<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Buddy</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ================= LOGIN PAGE ================= -->
    <div id="loginPage" class="login-page">

        <div class="login-box">

            <h2>📚 Study Buddy Login</h2>

            <input
                type="text"
                id="username"
                placeholder="Enter username"
                required
            >

            <input
                type="password"
                id="password"
                placeholder="Enter password"
                required
            >

            <button onclick="login()">Login</button>

        </div>

    </div>

    <!-- ================= MAIN APP ================= -->
    <div id="app" class="hidden">

        <!-- Sidebar -->
        <aside class="sidebar">

            <h2>📚 Study Buddy</h2>

            <ul>
                <li><a href="#dashboard">🏠 Dashboard</a></li>
                <li><a href="#notes">📝 Notes</a></li>
                <li><a href="#ai">🤖 AI</a></li>
            </ul>

        </aside>

        <!-- Main Content -->
        <main class="main">

            <!-- Header -->
            <header>

                <h1>Welcome 👋</h1>

                <button onclick="logout()">Logout</button>

            </header>

            <!-- Dashboard -->
            <section id="dashboard">

                <div class="cards">

                    <div class="card">
                        <h2 id="noteCount">0</h2>
                        <p>Total Notes</p>
                    </div>

                </div>

            </section>

            <!-- ================= NOTES ================= -->

            <section id="notes">

                <h2>📝 Notes (CRUD)</h2>

                <div class="box">

                    <input
                        type="text"
                        id="noteTitle"
                        placeholder="Enter note title"
                    >

                    <textarea
                        id="noteText"
                        rows="5"
                        placeholder="Write your note here..."
                    ></textarea>

                    <button onclick="addNote()">Add Note</button>

                </div>

                <div id="noteList"></div>

            </section>

            <!-- ================= AI SECTION ================= -->

            <section id="ai">

                <h2>🤖 Study Buddy AI</h2>

                <div class="box">

                    <textarea
                        id="aiQuestion"
                        rows="6"
                        placeholder="Enter a topic, question, or paste your notes..."
                    ></textarea>

                    <div class="ai-buttons">

                        <button onclick="askAI('explain')">
                            Explain
                        </button>

                        <button onclick="askAI('summarize')">
                            Summarize
                        </button>

                        <button onclick="askAI('plan')">
                            Study Plan
                        </button>

                    </div>

                </div>

                <div id="aiResponse" class="note">
                    AI output will appear here.
                </div>

            </section>

        </main>

    </div>

    <script src="script.js"></script>

</body>

</html>
